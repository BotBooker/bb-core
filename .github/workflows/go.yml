name: Run lint & Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - go.mod
      - go.sum
      - cmd/**
      - internal/**
  pull_request:
    branches:
      - main
    paths:
      - go.mod
      - go.sum
      - cmd/**
      - internal/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "^1"
          cache: true

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          args: --verbose

      - name: Bearer
        uses: bearer/bearer-action@828eeb928ce2f4a7ca5ed57fb8b59508cb8c79bc # v2
        with:
          diff: true

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.25", "1.26"]
        include:
          - os: ubuntu-latest
            go-build: ~/.cache/go-build
          - os: macos-latest
            go-build: ~/Library/Caches/go-build
    name: ${{ matrix.os }} @ Go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      GO111MODULE: on
      GOPROXY: https://proxy.golang.org
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.go-build }}
          key: ${{ runner.os }}-go-${{ matrix.go }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go }}-

      - name: Download dependencies
        run: go mod download

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: 16

      - name: Run Tests
        env:
          PG: postgres://postgres:postgres@localhost/postgres?sslmode=disable
        run: |
          go mod edit -go=${{ matrix.go }}
          TESTTAGS='-failfast -shuffle=off' make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          flags: ${{ matrix.os }},go-${{ matrix.go }}
