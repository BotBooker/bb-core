version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    groups:
      go-dependencies:
        patterns:
          - "*"
    schedule:
      interval: weekly
      day: monday
      time: "01:00"
      timezone: UTC
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: /
    groups:
      all-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
      day: monday
      time: "01:00"
      timezone: UTC
    commit-message:
      prefix: ci
    open-pull-requests-limit: 5
